name: Continuous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Definimos variáveis globais aqui para facilitar a manutenção
env:
  PROJECT_NAME: ${{ github.event.repository.name }} # Usa o nome do repo como padrão
  COMPOSE_FILE: docker-compose.yml

jobs:
  deploy:
    name: 🚀 Deploy ${{ github.event.repository.name }}
    runs-on: self-hosted

    steps:
      - name: 📂 Checkout do Código
        uses: actions/checkout@v4

      - name: 🛠️ Validar Ambiente e Arquivos
        run: |
          echo "Verificando arquivos críticos..."
          test -f ${{ env.COMPOSE_FILE }} || (echo "ERRO: ${{ env.COMPOSE_FILE }} não encontrado" && exit 1)
          
          echo "Validando sintaxe do Docker Compose..."
          docker compose -f ${{ env.COMPOSE_FILE }} config -q

      - name: 🐳 Atualizar e Subir Containers
        run: |
          echo "Atualizando imagens para o projeto: ${{ env.PROJECT_NAME }}"
          docker compose -f ${{ env.COMPOSE_FILE }} pull --quiet
          
          echo "Iniciando serviços..."
          # O parâmetro --project-name (ou -p) garante que o stack tenha o nome correto
          docker compose -p ${{ env.PROJECT_NAME }} -f ${{ env.COMPOSE_FILE }} up -d --remove-orphans --wait

      - name: 📊 Status Final
        run: |
          echo "--- Containers Ativos ---"
          docker compose -p ${{ env.PROJECT_NAME }} ps
          
          echo "--- Consumo de Recursos ---"
          # Aqui filtramos os stats apenas para os containers deste projeto específico
          docker stats --no-stream $(docker ps -q --filter "label=com.docker.compose.project=${{ env.PROJECT_NAME }}")

      - name: 🧹 Limpeza de Imagens Antigas
        if: always()
        run: |
          echo "Removendo imagens não utilizadas..."
          docker image prune -f